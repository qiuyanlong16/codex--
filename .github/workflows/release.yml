name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build:shared
      - run: pnpm --filter @byclaw-nanobot/web test

  build-windows:
    runs-on: windows-latest
    needs: test
    env:
      BYCLAW_TARGET_PLATFORM: win32
      BYCLAW_TARGET_ARCH: x64
      PNPM_CONFIG_FROZEN_LOCKFILE: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - uses: actions/setup-python@v5
        id: setup-python
        with:
          python-version: "3.12"
      - run: pnpm install --frozen-lockfile
      - run: node scripts/build/clone-nanobot.mjs
      - run: node scripts/build/ensure-brand-icons.mjs
      - run: pnpm build:shared
      - run: pnpm build:web
      - run: pnpm build:shell
      - run: node scripts/build/create-python-venv.mjs
        env:
          BYCLAW_PYTHON_EXE: ${{ steps.setup-python.outputs.python-path }}
      - run: node scripts/build/pack-python-venv.mjs
      - run: node scripts/build/bundle-cached.mjs
        env:
          BYCLAW_PACK_SKIP_NANOBOT: "1"
      - uses: actions/upload-artifact@v4
        with:
          name: codex---windows-x64
          path: dist-release/*.exe
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    needs: test
    env:
      BYCLAW_TARGET_PLATFORM: darwin
      BYCLAW_TARGET_ARCH: arm64
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      PNPM_CONFIG_FROZEN_LOCKFILE: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - uses: actions/setup-python@v5
        id: setup-python
        with:
          python-version: "3.12"
      - run: pnpm install --frozen-lockfile
      - run: node scripts/build/clone-nanobot.mjs
      - run: node scripts/build/ensure-brand-icons.mjs
      - run: pnpm build:shared
      - run: pnpm build:web
      - run: pnpm build:shell
      - run: node scripts/build/create-python-venv.mjs
        env:
          BYCLAW_PYTHON_EXE: ${{ steps.setup-python.outputs.python-path }}
      - run: node scripts/build/pack-python-venv.mjs
      - run: node scripts/build/bundle-cached.mjs
        env:
          BYCLAW_PACK_SKIP_NANOBOT: "1"
      - uses: actions/upload-artifact@v4
        with:
          name: codex---macos-arm64
          path: dist-release/*.dmg
          if-no-files-found: error

  publish:
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos]
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/codex---windows-x64/*
            artifacts/codex---macos-arm64/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
