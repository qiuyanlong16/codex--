appId: com.codex--.app
productName: codex--
electronVersion: 42.0.0

directories:
  output: dist-release
  buildResources: resources

files:
  - package.json
  - packages/shell/dist/**
  - packages/web/dist/**
  - resources/icons/tray-icon.bmp
  - from: .electron-pack/node_modules
    to: node_modules
    filter:
      - "**/*"
  - "!**/*.map"

asar: true
npmRebuild: false
extraMetadata:
  main: packages/shell/dist/main/index.js

compression: maximum
afterPack: scripts/post-build.cjs

extraResources:
  - from: resources/icons
    to: icons
    filter:
      - tray-icon.bmp
      - tray-icon.png
      - icon.png
  - from: packages/shell/resources
    to: .
    filter:
      - "python-venv_*.tar"
      - python-venv_manifest.json
  - from: packages/web/dist
    to: webui-dist
    filter:
      - "**/*"
  - from: packages/shell/resources/nanobot-bundle
    to: nanobot-bundle
    filter:
      - "**/*"
  - from: packages/shell/resources/installer-scripts
    to: installer-scripts
  - from: resources/nanobot-config-template
    to: nanobot-config-template

win:
  icon: resources/icons/icon.png
  target:
    - target: nsis

nsis:
  artifactName: "${productName}-Setup-${version}-${arch}.exe"
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: true
  installerSidebar: resources/installer/wizard-sidebar.bmp
  uninstallerSidebar: resources/installer/wizard-sidebar.bmp
  installerHeader: resources/installer/wizard-banner.bmp
  installerIcon: resources/icons/icon.ico
  uninstallerIcon: resources/icons/icon.ico
  include: resources/installer/custom.nsh
  deleteAppDataOnUninstall: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

mac:
  icon: resources/icons/icon.icns
  target:
    - target: dmg
  artifactName: "${productName}-${version}-${arch}.dmg"
  category: public.app-category.developer-tools
  identity: null
  gatekeeperAssess: false
  extraResources:
    - from: packages/shell/resources/python-darwin-runtime
      to: python-darwin-runtime
      filter:
        - "**/*"

linux:
  target:
    - target: AppImage
